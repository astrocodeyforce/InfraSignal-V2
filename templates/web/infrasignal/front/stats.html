<div id="front_stats" class="coverage-stats">

    <div class="coverage-stats__grid">
        <div class="coverage-stats__item">
            <span class="coverage-stats__number">50</span>
            <span class="coverage-stats__label">[% loc('States + D.C.') %]</span>
        </div>
        <div class="coverage-stats__item">
            <span class="coverage-stats__number">3,000+</span>
            <span class="coverage-stats__label">[% loc('Counties') %]</span>

            <span class="coverage-stats__number">25,000+</span>
            <span class="coverage-stats__label">[% loc('Cities & Towns') %]</span>
        </div>
        <div class="coverage-stats__item">
            <span class="coverage-stats__number">4</span>
