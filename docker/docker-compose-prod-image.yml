# ============================================================
# InfraSignal — Production (image-based variant) — DRAFT
# ============================================================
# This is the planned future replacement for docker-compose-prod.yml.
# Instead of bind-mounting the whole source tree at /var/www/fixmystreet
# (which means deploys = "git pull on the box"), it pulls a versioned
# image from GHCR built by CI on every push to the dev branch.
#
# Not active. Existing docker-compose-prod.yml stays the source of truth
# until we have staging-tested a few image tags end-to-end.
#
# Pre-flight checklist before cutting over:
#   [ ] CI is reliably pushing ghcr.io/astrocodeyforce/infrasignal-v2:<sha> and :dev
#   [ ] Staging has run on an image tag for >= 24h with no regressions
#   [ ] Backup taken (bin/backup-db)
#   [ ] Plan to repopulate web_assets volume from image OR keep web/ mount
#   [ ] conf/general.yml is a separate read-only mount (NOT baked into image)
#   [ ] Decide rollback strategy (just bump IMAGE_TAG back)
#
# Usage (once ready):
#   IMAGE_TAG=<git-sha-or-dev> sudo docker compose -p docker \
#       -f docker/docker-compose-prod-image.yml --env-file docker/.env up -d
# ============================================================

services:
  nginx:
    image: nginx:1.27.2
    depends_on:
      fixmystreet:
        condition: service_healthy
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - web_assets:/var/www/fixmystreet/web:ro
      - ../conf/nginx.conf-prod:/etc/nginx/conf.d/default.conf:ro
      - ../conf/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ../conf/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'Host: infrasignal.org' http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      default:
        aliases:
          - nginx.svc

  fixmystreet:
    image: ghcr.io/astrocodeyforce/infrasignal-v2:${IMAGE_TAG:-latest}
    command: docker/start-server-tuned
    tty: true
    restart: always
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    volumes:
      # conf/general.yml stays a separate read-only mount so we can rotate
      # secrets without rebuilding the image.
      - ../conf/general.yml:/var/www/fixmystreet/conf/general.yml:ro
      - fixmystreet-local:/var/www/fixmystreet/local
      # web_assets is shared with nginx; populated from the image on first
      # boot via an init container OR by docker cp at deploy time.
      - web_assets:/var/www/fixmystreet/web
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: "C.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      default:
        aliases:
          - fixmystreet.svc

  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile-postgres
    restart: always
    volumes:
      - ../db:/var/www/fixmystreet/db:ro
      - fixmystreet-pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: '/var/lib/postgresql/data/pgdata'
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      default:
        aliases:
          - postgres.svc

  memcached:
    image: memcached:1.6.32
    restart: always
    command: memcached -m 128 -c 1024 -t 2
    healthcheck:
      test: ["CMD-SHELL", "echo stats | busybox nc -w1 localhost 11211 2>/dev/null | grep -q pid || echo 'stats' | timeout 2 bash -c 'cat > /dev/tcp/localhost/11211' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  fixmystreet-pgdata:
  fixmystreet-local:
  web_assets:
