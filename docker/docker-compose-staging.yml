# ============================================================
# InfraSignal — Staging Docker Compose
# ============================================================
# Pre-production environment for verification before going live.
# Uses same architecture as production but:
#   - Staging banner shown
#   - Reports NOT sent to real bodies
#   - Separate database
#   - Ports on 8080/8443 to avoid conflicting with prod
#
# Usage:
#   docker compose -f docker/docker-compose-staging.yml --env-file docker/.env up -d
#   docker compose -f docker/docker-compose-staging.yml --env-file docker/.env down
# ============================================================

services:
  nginx:
    image: nginx:1.27.2
    depends_on:
      fixmystreet:
        condition: service_healthy
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ../web:/var/www/fixmystreet/web:ro
      - ../conf/nginx.conf-docker:/etc/nginx/conf.d/default.conf:ro
      - ../conf/nginx-main.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      default:
        aliases:
          - nginx.svc

  fixmystreet:
    build:
      context: ..
      dockerfile: docker/Dockerfile-development
    command: docker/start-server-tuned
    tty: true
    restart: always
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    volumes:
      - ../:/var/www/fixmystreet
      - staging-local:/var/www/fixmystreet/local
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: "C.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - fixmystreet.svc

  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile-postgres
    restart: always
    volumes:
      - ../db:/var/www/fixmystreet/db:ro
      - staging-pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: '/var/lib/postgresql/data/pgdata'
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      default:
        aliases:
          - postgres.svc

  memcached:
    image: memcached:1.6.32
    restart: always
    command: memcached -m 64 -c 512
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  staging-pgdata:
  staging-local:
