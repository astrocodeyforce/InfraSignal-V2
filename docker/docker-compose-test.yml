# ============================================================
# InfraSignal — Test Docker Compose
# ============================================================
# Used by CI pipeline (GitHub Actions) and local test runs
#
# Usage:
#   docker compose -f docker/docker-compose-test.yml up -d
#   docker compose -f docker/docker-compose-test.yml run --rm test
#   docker compose -f docker/docker-compose-test.yml down -v
# ============================================================

services:
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile-development
    command: script/test --jobs 3 t
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    volumes:
      - ../:/var/www/fixmystreet
      - test-local:/var/www/fixmystreet/local
    environment:
      POSTGRES_PASSWORD: test_password
      FMS_DB_HOST: postgres.svc
      FMS_DB_NAME: infrasignal_test
      LANG: "C.UTF-8"
      HARNESS_TIMER: 1
    networks:
      default:
        aliases:
          - fixmystreet.svc

  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile-postgres
    environment:
      POSTGRES_PASSWORD: test_password
      PGDATA: '/var/lib/postgresql/data/pgdata'
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      default:
        aliases:
          - postgres.svc

  memcached:
    image: memcached:1.6.32
    command: memcached -m 64
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  test-local:
