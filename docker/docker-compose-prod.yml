# ============================================================
# InfraSignal — Production Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker/docker-compose-prod.yml up -d
#   docker compose -f docker/docker-compose-prod.yml down
#
# Differences from dev:
#   - No MailHog (emails go via real SMTP / SendGrid)
#   - No CSS watcher (CSS is pre-built at deploy time)
#   - No setup service (run manually: docker compose ... run --rm setup docker/setup)
#   - Health checks on all services
#   - Resource limits to prevent OOM on 8 GB server
#   - Logging configuration with rotation
# ============================================================

services:
  nginx:
    image: nginx:1.27.2
    depends_on:
      fixmystreet:
        condition: service_healthy
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ../web:/var/www/fixmystreet/web:ro
      - ../conf/nginx.conf-prod:/etc/nginx/conf.d/default.conf:ro
      - ../conf/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ../conf/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - nginx.svc

  fixmystreet:
    build:
      context: ..
      dockerfile: docker/Dockerfile-development
    command: docker/start-server-tuned
    tty: true
    restart: always
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    volumes:
      - ../:/var/www/fixmystreet
      - fixmystreet-local:/var/www/fixmystreet/local
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: "C.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      default:
        aliases:
          - fixmystreet.svc

  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile-postgres
    restart: always
    volumes:
      - ../db:/var/www/fixmystreet/db:ro
      - fixmystreet-pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: '/var/lib/postgresql/data/pgdata'
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - postgres.svc

  memcached:
    image: memcached:1.6.32
    restart: always
    command: memcached -m 128 -c 1024 -t 2
    healthcheck:
      test: ["CMD-SHELL", "echo stats | busybox nc -w1 localhost 11211 2>/dev/null | grep -q pid || echo 'stats' | timeout 2 bash -c 'cat > /dev/tcp/localhost/11211' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      default:
        aliases:
          - memcached.svc

volumes:
  fixmystreet-pgdata:
  fixmystreet-local:
